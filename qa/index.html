<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Early Bird QA</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #1a1a1a; color: #e0e0e0; height: 100vh; overflow: hidden; }

  /* ── Top Bar ── */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 24px; background: #222; border-bottom: 1px solid #333;
    height: 52px;
  }
  .topbar-left { display: flex; align-items: center; gap: 16px; }
  .topbar-title { font-weight: 700; font-size: 14px; letter-spacing: 0.05em; }
  .topbar-title span { color: #0066FF; }
  .version-select {
    background: #333; color: #ccc; border: 1px solid #444; border-radius: 4px;
    padding: 4px 8px; font-size: 12px; cursor: pointer;
  }
  .topbar-nav { display: flex; align-items: center; gap: 8px; }
  .topbar-nav button {
    background: #333; border: 1px solid #444; color: #ccc; border-radius: 4px;
    padding: 6px 14px; font-size: 12px; cursor: pointer; transition: background 0.15s;
  }
  .topbar-nav button:hover { background: #444; color: #fff; }
  .topbar-nav button:disabled { opacity: 0.3; cursor: default; }
  .screen-label { font-size: 13px; color: #999; }
  .screen-label strong { color: #e0e0e0; }

  /* ── Main Layout ── */
  .main { display: flex; height: calc(100vh - 52px); }

  /* ── Phone Column ── */
  .phone-col {
    flex: 0 0 320px; display: flex; align-items: flex-start; justify-content: center;
    padding: 16px 8px;
  }

  /* ── iPhone Frame ── */
  .iphone-wrap {
    transform: scale(0.7); transform-origin: top center;
  }
  .iphone {
    width: 390px; height: 844px; background: #000; border-radius: 50px;
    padding: 14px; position: relative;
    box-shadow: 0 0 0 2px #333, 0 20px 60px rgba(0,0,0,0.5);
  }
  .iphone-screen {
    width: 100%; height: 100%; border-radius: 38px; overflow: hidden;
    background: #fff; position: relative;
  }
  /* Dynamic Island */
  .iphone::before {
    content: ''; position: absolute; top: 18px; left: 50%; transform: translateX(-50%);
    width: 126px; height: 36px; background: #000; border-radius: 20px; z-index: 10;
  }
  /* Home indicator */
  .iphone::after {
    content: ''; position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%);
    width: 140px; height: 5px; background: #444; border-radius: 3px; z-index: 10;
  }
  /* Safari bar - minimal, just shows URL below notch */
  .safari-bar {
    display: none;
  }
  .safari-url { display: none; }
  .iphone iframe {
    width: 362px; height: 770px; border: none;
    margin-top: 46px;
  }

  /* ── Notes Column ── */
  .notes-col {
    flex: 1; display: flex; flex-direction: column; padding: 24px;
    border-left: 1px solid #333; min-width: 300px;
  }
  .notes-header {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.1em; color: #888; margin-bottom: 12px;
  }
  .notes-screen-title {
    font-size: 18px; font-weight: 700; margin-bottom: 4px;
  }
  .notes-screen-desc {
    font-size: 13px; color: #888; margin-bottom: 16px; line-height: 1.4;
  }
  .notes-textarea {
    flex: 1; width: 100%; background: #2a2a2a; border: 1px solid #444;
    border-radius: 8px; padding: 14px; color: #e0e0e0; font-size: 14px;
    font-family: 'JetBrains Mono', 'SF Mono', monospace; line-height: 1.5;
    resize: none; outline: none; transition: border-color 0.15s;
  }
  .notes-textarea:focus { border-color: #0066FF; }
  .notes-textarea::placeholder { color: #555; }
  .notes-footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 12px; gap: 12px;
  }
  .notes-status { font-size: 11px; color: #666; }
  .notes-status.saved { color: #4a9a65; }
  .export-btn {
    background: #0066FF; color: #fff; border: none; border-radius: 6px;
    padding: 8px 16px; font-size: 12px; font-weight: 600; cursor: pointer;
    transition: background 0.15s;
  }
  .export-btn:hover { background: #0052CC; }

  /* ── Bottom Dots ── */
  .dots-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: center;
    gap: 6px; padding: 12px; background: #222; border-top: 1px solid #333;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%; background: #444;
    cursor: pointer; transition: background 0.15s, transform 0.15s;
  }
  .dot:hover { background: #666; }
  .dot.active { background: #0066FF; transform: scale(1.3); }
  .dot.has-notes { background: #4a9a65; }
  .dot.has-notes.active { background: #0066FF; box-shadow: 0 0 0 2px #4a9a65; }

  /* ── Section Labels in Dots ── */
  .dot-section {
    font-size: 9px; color: #555; text-transform: uppercase; letter-spacing: 0.1em;
    margin: 0 4px;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-title">EARLY BIRD <span>QA</span></div>
    <select class="version-select" id="version-select">
      <option value="0.5.0">v0.5.0</option>
    </select>
    <span class="screen-label" id="screen-label"></span>
  </div>
  <div class="topbar-nav">
    <button onclick="go(-1)" id="prev-btn">← Prev</button>
    <button onclick="go(1)" id="next-btn">Next →</button>
  </div>
</div>

<div class="main">
  <div class="phone-col">
    <div class="iphone-wrap"><div class="iphone">
      <div class="iphone-screen">
        <div class="safari-bar"><div class="safari-url" id="safari-url">earlybird.la</div></div>
        <iframe id="app-frame" src="about:blank"></iframe>
      </div>
    </div></div>
  </div>
  <div class="notes-col">
    <div class="notes-header">NOTES</div>
    <div class="notes-screen-title" id="notes-title"></div>
    <div class="notes-screen-desc" id="notes-desc"></div>
    <textarea class="notes-textarea" id="notes-input" placeholder="Type your QA notes here...&#10;&#10;Issues, suggestions, observations..."></textarea>
    <div class="notes-footer">
      <span class="notes-status" id="notes-status"></span>
      <button class="export-btn" onclick="exportNotes()">Export All Notes ↓</button>
    </div>
  </div>
</div>

<div class="dots-bar" id="dots-bar"></div>

<!-- All notes as hidden data for Claude to read -->
<textarea id="all-notes-data" style="display:none"></textarea>

<script>
// Use relative path — works on both localhost and GitHub Pages
const APP_URL = '..';

// Test user IDs
const USERS = {
  eli: '8935f2ac-4998-4e6d-9c31-47dbbce896fd',
  loubna: '9cc49ca0-1235-43aa-bbcb-93a0742b9aea',
  marco: '5a021f0e-4b9b-40bb-9786-595629acfb0a',
  freshBuyer: '99db7c21-d996-4ef0-8024-e4b2f67849bc',
  freshDealer: 'fc1df7fa-2247-4d7a-94dd-9a84d1abd8b1',
};

// Helper to reduce boilerplate
const B = (eval_code) => ({ user: 'loubna', eval: "document.body.classList.add('in-app');" + eval_code });
const D = (eval_code) => ({ user: 'eli', eval: "document.body.classList.add('in-app'); document.querySelectorAll('.nav-dealer-only').forEach(el=>el.classList.remove('hidden'));" + eval_code });
const FD = (eval_code) => ({ user: 'freshDealer', eval: "document.body.classList.add('in-app'); document.querySelectorAll('.nav-dealer-only').forEach(el=>el.classList.remove('hidden'));" + eval_code });
const NA = (eval_code) => ({ clearAuth: true, eval: eval_code });

// Screen definitions — every screen gets an explicit eval to force correct state
const SCREENS = [
  // ── Pre-Auth ──
  { id: 'landing-buyer', name: 'Landing (Buyer)', section: 'Pre-Auth',
    desc: 'Marketing page with markets, phone input, "Get Early Access" CTA',
    setup: NA("showScreen('landing'); loadLanding();") },
  { id: 'landing-dealer', name: 'Landing (Dealer)', section: 'Pre-Auth',
    desc: 'Dealer entry: "Sell to serious buyers", free badge, how-it-works',
    setup: NA("showScreen('dealer-landing')") },
  { id: 'onboarding', name: 'Onboarding', section: 'Pre-Auth',
    desc: 'Selfie upload + name input after first login',
    setup: NA("showScreen('onboarding')") },
  { id: 'verify-success', name: 'Verify (Success)', section: 'Pre-Auth',
    desc: 'Magic link verification — success state',
    setup: NA("showScreen('verify'); document.getElementById('verify-status').textContent=\"You're in.\";") },
  { id: 'verify-failure', name: 'Verify (Failure)', section: 'Pre-Auth',
    desc: 'Magic link verification — expired/failed with back link',
    setup: NA("showScreen('verify'); document.getElementById('verify-status').innerHTML='Link expired.<br><a href=\"#\" onclick=\"event.preventDefault();showScreen(\\'landing\\');\" style=\"color:var(--accent);font-size:13px;margin-top:12px;display:inline-block\">Back to home</a>'; document.getElementById('verify-status').className='verify-error';") },

  // ── Buyer ──
  { id: 'feed-populated', name: 'Feed', section: 'Buyer',
    desc: 'Shop tab with items — buyer nav (no Booth tab)',
    setup: B("switchTab('feed');") },
  { id: 'feed-saved-empty', name: 'Feed — Saved (Empty)', section: 'Buyer',
    desc: 'Saved tab, no favorites — empty state with heart icon',
    setup: B("switchTab('feed'); setTimeout(()=>setBrowseMode('saved', document.querySelector('.seg-btn:last-child')), 1000);") },
  { id: 'feed-saved-populated', name: 'Feed — Saved (Has Favorites)', section: 'Buyer',
    desc: 'Saved tab showing favorited items',
    setup: B("switchTab('feed'); setTimeout(()=>setBrowseMode('saved', document.querySelector('.seg-btn:last-child')), 1000);") },
  { id: 'feed-filter-sheet', name: 'Feed — Filter Sheet', section: 'Buyer',
    desc: 'Bottom sheet with category and dealer filters',
    setup: B("switchTab('feed'); setTimeout(()=>openFilterSheet(), 1000);") },
  { id: 'item-detail', name: 'Item Detail (Live)', section: 'Buyer',
    desc: 'Live item — photo, price, seller info, compose area',
    setup: B("openItem('e12a7cda-23f4-4ad3-b10a-5751c4b4f970');") },
  { id: 'item-detail-held', name: 'Item Detail (Held)', section: 'Buyer',
    desc: 'Item on hold — shows held status banner',
    setup: B("openItem('6b358975-12f8-416f-a099-f74a5aef3f13');") },
  { id: 'item-detail-sold', name: 'Item Detail (Sold)', section: 'Buyer',
    desc: 'Sold item — shows sold status banner',
    setup: B("openItem('e9968495-4346-4090-91db-39f15f5643cc');") },
  { id: 'compose', name: 'Compose (I Want This)', section: 'Buyer',
    desc: '"I\'ll take it", "Make an offer", "Ask a question" chip buttons',
    setup: { user: 'marco', eval: "document.body.classList.add('in-app'); openItem('e12a7cda-23f4-4ad3-b10a-5751c4b4f970'); setTimeout(()=>document.getElementById('detail-actions')?.scrollIntoView({behavior:'smooth'}), 1500);" } },
  { id: 'conversation', name: 'Conversation', section: 'Buyer',
    desc: 'Message thread — back link, item context, reply bar',
    setup: B("loadConversation('ZjWgPaD7');") },
  { id: 'messages-buyer', name: 'Messages', section: 'Buyer',
    desc: 'Message list — no buying/selling filter (buyers only buy)',
    setup: B("switchTab('messages');") },
  { id: 'messages-empty', name: 'Messages (Empty)', section: 'Buyer',
    desc: 'Empty state: "No messages" with helper text',
    setup: FD("switchTab('messages');") },
  { id: 'settings-buyer', name: 'Settings', section: 'Buyer',
    desc: 'Buyer account — no payment fields, no booth settings',
    setup: B("switchTab('settings');") },

  // ── Dealer ──
  { id: 'booth-fresh', name: 'Booth — Setup Card', section: 'Dealer',
    desc: 'First time for this market: booth location, payment setup',
    setup: FD("switchTab('dealer-home');") },
  { id: 'booth-empty', name: 'Booth — Empty (Post-Setup)', section: 'Dealer',
    desc: 'Setup done but no items yet — compelling CTA to add items',
    setup: FD("switchTab('dealer-home'); setTimeout(()=>{ const card=document.getElementById('booth-setup-card'); if(card) card.classList.add('hidden'); document.getElementById('dealer-empty')?.classList.remove('hidden'); }, 1200);") },
  { id: 'booth-active', name: 'Booth — With Items', section: 'Dealer',
    desc: 'Items with stats, status pills, action buttons, countdown',
    setup: D("switchTab('dealer-home');") },
  { id: 'booth-picker', name: 'Booth — Market Picker', section: 'Dealer',
    desc: 'Bottom sheet to switch between markets',
    setup: D("switchTab('dealer-home'); setTimeout(()=>openMarketPicker(), 1500);") },
  { id: 'add-item', name: 'Add Item', section: 'Dealer',
    desc: 'Photo upload, price, notes, post button',
    setup: D("showAddItem();") },
  { id: 'item-detail-own', name: 'My Item (as Seller)', section: 'Dealer',
    desc: 'Viewing own item — inquiry list, status controls (hold/sold/live)',
    setup: D("openItem('e12a7cda-23f4-4ad3-b10a-5751c4b4f970');") },
  { id: 'conversation-seller', name: 'Conversation (as Seller)', section: 'Dealer',
    desc: 'Message thread as seller — seeing buyer inquiry about your item',
    setup: D("loadConversation('zaUjFSTf');") },
  { id: 'messages-populated', name: 'Messages', section: 'Dealer',
    desc: 'Message list with All/Buying/Selling filter tabs',
    setup: D("switchTab('messages');") },
  { id: 'settings', name: 'Settings', section: 'Dealer',
    desc: 'Avatar, name, biz, payment fields, preferences, logout',
    setup: D("switchTab('settings');") },

  // ── Dealer as Buyer ──
  { id: 'feed-as-dealer', name: 'Feed', section: 'Dealer as Buyer',
    desc: 'Browsing items — same feed but with dealer nav',
    setup: D("switchTab('feed');") },
  { id: 'item-detail-as-dealer', name: 'Item Detail', section: 'Dealer as Buyer',
    desc: 'Viewing another dealer\'s item — buyer view with dealer nav',
    setup: D("openItem('e9968495-4346-4090-91db-39f15f5643cc');") },

  // ── Admin ──
  { id: 'admin-dashboard', name: 'Admin Dashboard', section: 'Admin',
    desc: 'Stats, upcoming market, recent activity',
    setup: { eval: "localStorage.setItem('eb_admin_token','early-bird-admin-2026'); showScreen('admin'); location.hash='#/admin';" } },
  { id: 'admin-markets', name: 'Admin — Markets', section: 'Admin',
    desc: 'All markets with create form, counts, status',
    setup: { eval: "localStorage.setItem('eb_admin_token','early-bird-admin-2026'); showScreen('admin'); location.hash='#/admin/markets';" } },
  { id: 'admin-dealers', name: 'Admin — Dealers', section: 'Admin',
    desc: 'All dealers/buyers with search, role badges, invite form',
    setup: { eval: "localStorage.setItem('eb_admin_token','early-bird-admin-2026'); showScreen('admin'); location.hash='#/admin/dealers';" } },
  { id: 'admin-items', name: 'Admin — Items', section: 'Admin',
    desc: 'All items with filters, status, quick actions',
    setup: { eval: "localStorage.setItem('eb_admin_token','early-bird-admin-2026'); showScreen('admin'); location.hash='#/admin/items';" } },
  { id: 'admin-sms', name: 'Admin — SMS Blast', section: 'Admin',
    desc: 'Send SMS to buyers/sellers, blast history with delivery stats',
    setup: { eval: "localStorage.setItem('eb_admin_token','early-bird-admin-2026'); showScreen('admin'); location.hash='#/admin/sms';" } },

  // ── States ──
  { id: 'loading', name: 'Loading State', section: 'States',
    desc: 'Spinner shown while data loads',
    setup: D("switchTab('feed'); setTimeout(()=>{document.getElementById('feed-content').innerHTML='<div class=\"loading-center\"><span class=\"spinner\"></span></div>';}, 500);") },
  { id: 'error', name: 'Error State', section: 'States',
    desc: 'Error with retry button',
    setup: D("switchTab('feed'); setTimeout(()=>{document.getElementById('feed-content').innerHTML='<div class=\"state-error\"><div class=\"state-error-msg\">Could not load items</div><button class=\"btn-secondary\" onclick=\"loadFeed()\">Try again</button></div>';}, 500);") },
];

let currentIndex = 0;
let notes = {}; // { screenId: "note text" }
let saveTimer;

// Load notes from localStorage
// Seed notes from previous session (localhost) — only used if no notes exist yet
const SEED_NOTES = {"landing-buyer":"","landing-dealer":"","feed-populated":"","messages-populated":"Messages look good - previews and timestamps showing. Check if unread indicator works.","booth-active":""};
try {
  const saved = localStorage.getItem('eb_qa_notes');
  if (saved) { notes = JSON.parse(saved); }
  else { notes = SEED_NOTES; localStorage.setItem('eb_qa_notes', JSON.stringify(notes)); }
} catch(e) { notes = SEED_NOTES; }

// Init
function init() {
  // Render dots
  const dotsBar = document.getElementById('dots-bar');
  let lastSection = '';
  SCREENS.forEach((s, i) => {
    if (s.section !== lastSection) {
      const label = document.createElement('span');
      label.className = 'dot-section';
      label.textContent = s.section;
      dotsBar.appendChild(label);
      lastSection = s.section;
    }
    const dot = document.createElement('div');
    dot.className = 'dot';
    dot.title = s.name;
    dot.onclick = () => goTo(i);
    dotsBar.appendChild(dot);
  });

  // Read hash
  const hashMatch = window.location.hash.match(/^#\/screen\/(\d+)$/);
  if (hashMatch) currentIndex = Math.min(parseInt(hashMatch[1]), SCREENS.length - 1);

  loadScreen(currentIndex);

  // Keyboard nav
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'TEXTAREA') return;
    if (e.key === 'ArrowLeft') go(-1);
    if (e.key === 'ArrowRight') go(1);
  });
}

function goTo(i) {
  saveCurrentNotes();
  currentIndex = i;
  history.pushState(null, '', `#/screen/${i}`);
  loadScreen(i);
}

function go(delta) {
  const next = currentIndex + delta;
  if (next < 0 || next >= SCREENS.length) return;
  goTo(next);
}

window.addEventListener('popstate', () => {
  const m = window.location.hash.match(/^#\/screen\/(\d+)$/);
  if (m) { currentIndex = parseInt(m[1]); loadScreen(currentIndex); }
});

function loadScreen(i) {
  const s = SCREENS[i];

  // Update UI
  document.getElementById('screen-label').innerHTML = `<strong>${i + 1}</strong> of ${SCREENS.length} — ${s.name}`;
  document.getElementById('notes-title').textContent = s.name;
  document.getElementById('notes-desc').textContent = s.desc;
  document.getElementById('prev-btn').disabled = i === 0;
  document.getElementById('next-btn').disabled = i === SCREENS.length - 1;

  // Update dots
  document.querySelectorAll('.dot').forEach((d, j) => {
    d.className = 'dot';
    if (j === i) d.classList.add('active');
    const sid = SCREENS[j].id;
    if (notes[sid] && notes[sid].trim()) d.classList.add('has-notes');
  });

  // Load notes
  document.getElementById('notes-input').value = notes[s.id] || '';
  document.getElementById('notes-status').textContent = '';

  // Update safari bar
  const displayUrl = s.setup.hash ? `earlybird.la/${s.setup.hash}` : 'earlybird.la';
  document.getElementById('safari-url').textContent = displayUrl;

  // Load iframe
  loadIframe(s);

  // Update hidden all-notes
  updateAllNotes();
}

function loadIframe(screen) {
  const iframe = document.getElementById('app-frame');
  const setup = screen.setup;

  // Same-origin: set localStorage BEFORE loading the iframe
  // This way the app reads the right auth state on first load
  if (setup.clearAuth) {
    localStorage.removeItem('eb_dealer_id');
    localStorage.removeItem('eb_token');
    localStorage.removeItem('eb_active_tab');
    localStorage.removeItem('eb_current_market');
  }
  if (setup.user) {
    const uid = USERS[setup.user];
    localStorage.setItem('eb_dealer_id', uid);
    localStorage.setItem('eb_token', uid);
  }

  // Load the app — set hash after load to avoid double-slash URL issues
  iframe.src = APP_URL + '/';

  iframe.onload = () => {
    try {
      const win = iframe.contentWindow;
      // Set hash if needed (triggers the app's route() via hashchange)
      if (setup.hash) win.location.hash = setup.hash;
      // Run any eval setup after app has initialized
      if (setup.eval) {
        setTimeout(() => {
          try { win.eval(setup.eval); } catch(e) { console.warn('eval error:', e); }
        }, 1000);
      }
    } catch(e) { console.warn('iframe setup error:', e); }
  };
}

// Notes
document.getElementById('notes-input').addEventListener('input', () => {
  clearTimeout(saveTimer);
  document.getElementById('notes-status').textContent = 'Typing...';
  document.getElementById('notes-status').className = 'notes-status';
  saveTimer = setTimeout(saveCurrentNotes, 500);
});

function saveCurrentNotes() {
  const s = SCREENS[currentIndex];
  const val = document.getElementById('notes-input').value;
  notes[s.id] = val;
  localStorage.setItem('eb_qa_notes', JSON.stringify(notes));
  document.getElementById('notes-status').textContent = 'Saved ✓';
  document.getElementById('notes-status').className = 'notes-status saved';
  updateAllNotes();
  // Update dot
  const dots = document.querySelectorAll('.dot');
  if (dots[currentIndex]) {
    dots[currentIndex].classList.toggle('has-notes', val.trim().length > 0);
  }
  // Sync to API so Claude can read in real time
  syncToApi();
}

let _syncTimer;
function syncToApi() {
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(() => {
    fetch('https://early-bird.objectlesson.workers.dev/api/qa-notes', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ notes })
    }).catch(() => {});
  }, 1000);
}

function updateAllNotes() {
  const lines = [`# Early Bird QA Notes — v0.5.0`, `Generated: ${new Date().toISOString().slice(0, 16)}`, ''];
  let lastSection = '';
  SCREENS.forEach(s => {
    if (s.section !== lastSection) {
      lines.push(`## ${s.section}`, '');
      lastSection = s.section;
    }
    const note = (notes[s.id] || '').trim();
    if (note) {
      lines.push(`### ${s.name}`, note, '');
    } else {
      lines.push(`### ${s.name}`, '_No notes_', '');
    }
  });
  document.getElementById('all-notes-data').value = lines.join('\n');
}

function exportNotes() {
  const content = document.getElementById('all-notes-data').value;
  const blob = new Blob([content], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'QA-NOTES.md';
  a.click();
  URL.revokeObjectURL(url);
}

// Fetch version
fetch(APP_URL + '/VERSION').then(r => r.text()).then(v => {
  const ver = v.trim();
  const sel = document.getElementById('version-select');
  sel.innerHTML = `<option value="${ver}">v${ver}</option>`;
}).catch(() => {});

init();
</script>
</body>
</html>
